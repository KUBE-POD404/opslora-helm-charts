name: Azure Helm Lint

on:
  pull_request:
    paths:
      - "opslora-helm/**"
      - ".github/workflows/azure-helm-lint.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Azure app charts
        shell: bash
        run: |
          set -euo pipefail
          helm lint opslora-helm/infra/rabbitmq \
            -f opslora-helm/infra/rabbitmq/values.yaml \
            -f opslora-helm/infra/rabbitmq/values-azure-test.yaml
          for chart in auth customer frontend inventory invoice notification order payment; do
            helm lint "opslora-helm/apps/${chart}" \
              -f "opslora-helm/apps/${chart}/values.yaml" \
              -f "opslora-helm/apps/${chart}/values-azure-test.yaml"
          done

      - name: Render Azure app charts
        shell: bash
        run: |
          set -euo pipefail
          helm template rabbitmq-azure-test opslora-helm/infra/rabbitmq \
            -f opslora-helm/infra/rabbitmq/values.yaml \
            -f opslora-helm/infra/rabbitmq/values-azure-test.yaml \
            >/tmp/rabbitmq-azure-test.yaml
          for chart in auth customer frontend inventory invoice order payment; do
            helm template "${chart}" "opslora-helm/apps/${chart}" \
              -f "opslora-helm/apps/${chart}/values.yaml" \
              -f "opslora-helm/apps/${chart}/values-azure-test.yaml" \
              >/tmp/${chart}-azure-test.yaml
            grep -q "kind: Ingress" /tmp/${chart}-azure-test.yaml
            ! grep -q "kind: HTTPRoute" /tmp/${chart}-azure-test.yaml
          done
          helm template notification opslora-helm/apps/notification \
            -f opslora-helm/apps/notification/values.yaml \
            -f opslora-helm/apps/notification/values-azure-test.yaml \
            >/tmp/notification-azure-test.yaml
