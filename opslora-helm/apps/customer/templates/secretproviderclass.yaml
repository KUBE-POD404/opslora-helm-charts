{{- if .Values.azureKeyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.azureKeyVault.secretProviderClassName | default (printf "%s-akv" .Values.secretName) }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.secretName }}
      type: Opaque
      data:
{{- range .Values.azureKeyVault.secrets }}
        - objectName: {{ .objectName | quote }}
          key: {{ .envName | quote }}
{{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.azureKeyVault.identityClientId | quote }}
    keyvaultName: {{ .Values.azureKeyVault.keyVaultName | quote }}
    tenantId: {{ .Values.azureKeyVault.tenantId | quote }}
    objects: |
      array:
{{- range .Values.azureKeyVault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
{{- end }}
{{- end }}