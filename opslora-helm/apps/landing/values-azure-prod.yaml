fullname: landing-site-prod
image:
  repository: acropsloraprodcin001.azurecr.io/opslora-landing-site
  tag: v2.0.0
  pullPolicy: Always
ingress:
  enabled: true
  name: landing-ingress
  className: azure-application-gateway
  annotations:
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: opslora-wildcard-le
    appgw.ingress.kubernetes.io/ssl-redirect: 'true'
  hosts:
  - host: opslora.com
    paths:
    - path: /
      pathType: Prefix
  backend:
    name: landing-service
    port: 80
