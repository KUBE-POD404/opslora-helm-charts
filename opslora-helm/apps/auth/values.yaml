azureKeyVault:
  enabled: false
  keyVaultName: ""
  tenantId: ""
  identityClientId: ""
  secretProviderClassName: ""
  secrets: []
sealedSecret:
  enabled: true

namespace: opslora-app-ns

name: auth
fullname: auth-service

labels:
  app: auth
  component: backend

selectorLabels:
  app: auth

serviceAccount:
  create: true
  name: auth-sa

replicaCount: 2

image:
  repository: ghcr.io/kube-pod404/opslora-auth-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

containerPort: 3000

secretName: auth-secret

service:
  name: auth-service
  port: 3000
  labels:
    app: auth
  selectorLabels:
    app: auth

gateway:
  name: opslora-gateway
  namespace: opslora-gateway-ns

route:
  name: auth-route
  hostnames:
    - opslora.com
  path:
    type: PathPrefix
    value: /api/v1/auth
  backend:
    name: auth-service
    port: 3000

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

pod:
  automountServiceAccountToken: false

affinity:
  enabled: false

resources: {} 

probes:
  readiness:
    enabled: true
    path: /api/v1/auth/health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

  liveness:
    enabled: true
    path: /api/v1/auth/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

networkPolicy:
  enabled: false
  # Start permissive to provide an auditable NetworkPolicy object without breaking
  # Azure Application Gateway ingress, Key Vault CSI, DNS, RabbitMQ, or service-to-service traffic.
  # Tighten these after a dedicated connectivity test matrix is in place.
  allowAllIngress: true
  allowAllEgress: true
