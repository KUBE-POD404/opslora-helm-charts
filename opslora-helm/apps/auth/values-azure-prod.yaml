gateway:
  enabled: false

ingress:
  enabled: true
  name: auth-ingress
  className: azure/application-gateway
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: /
  hosts:
    - host: app.opslora.com
      paths:
        - path: /api/v1/auth
          pathType: Prefix
  backend:
    name: auth-service
    port: 3000

