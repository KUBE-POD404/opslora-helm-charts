apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.fullname }}-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded

spec:
  template:
    spec:
      restartPolicy: OnFailure
      {{- if .Values.azureKeyVault.enabled }}
      initContainers:
        - name: sync-keyvault-secrets
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              ls /mnt/secrets-store >/dev/null
              sleep 5
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
      {{- end }}
      {{- if .Values.azureKeyVault.enabled }}
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.azureKeyVault.secretProviderClassName | default (printf "%s-akv" .Values.secretName) }}
      {{- end }}

      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              alembic upgrade head
              python -m app.init_db

          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
            {{- if .Values.config }}
            - configMapRef:
                name: {{ .Values.name }}-config
            {{- end }}
          {{- if .Values.azureKeyVault.enabled }}
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
