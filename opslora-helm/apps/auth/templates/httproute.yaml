{{- if (default true .Values.gateway.enabled) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.route.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    {{- toYaml .Values.labels | nindent 4 }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}

  hostnames:
    {{- range .Values.route.hostnames }}
    - {{ . | quote }}
    {{- end }}

  rules:
    - matches:
        - path:
            type: {{ .Values.route.path.type }}
            value: {{ .Values.route.path.value }}

      backendRefs:
        - name: {{ default .Values.fullname .Values.route.backend.name }}
          port: {{ default .Values.service.port .Values.route.backend.port }}
{{- end }}
