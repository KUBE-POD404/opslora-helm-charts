gateway:
  enabled: false

ingress:
  enabled: true
  name: frontend-ingress
  className: azure/application-gateway
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: /
  hosts:
    - host: app-test.opslora.com
      paths:
        - path: /
          pathType: Prefix
  backend:
    name: frontend-service
    port: 8000

