namespace: opslora-app-ns

fullname: frontend-service

labels:
  app: frontend

selectorLabels:
  app: frontend

replicaCount: 2

image:
  repository: ghcr.io/kube-pod404/opslora-frontend-service
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

containerPort: 3000

serviceAccount:
  create: true
  name: frontend-sa

service:
  name: frontend-service
  port: 8000

gateway:
  name: opslora-gateway
  namespace: opslora-gateway-ns

route:
  hostnames:
    - opslora.com
  path:
    type: PathPrefix
    value: /

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

pod:
  automountServiceAccountToken: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

affinity:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

networkPolicy:
  enabled: false
  # Start permissive to provide an auditable NetworkPolicy object without breaking
  # Azure Application Gateway ingress, Key Vault CSI, DNS, RabbitMQ, or service-to-service traffic.
  # Tighten these after a dedicated connectivity test matrix is in place.
  allowAllIngress: true
  allowAllEgress: true
