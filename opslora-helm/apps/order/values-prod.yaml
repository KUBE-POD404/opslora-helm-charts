fullName: order-service
replicaCount: 3
image:
  repository: ghcr.io/kube-pod404/opslora-order-service
  tag: 9e536c5
  pullPolicy: IfNotPresent
global:
  host: opslora.com
secretName: order-secret
config:
  CUSTOMER_SERVICE_URL: http://customer-service:3000
  INVENTORY_SERVICE_URL: http://inventory-service:3000
serviceAccount:
  create: true
  name: ''
pod:
  automountServiceAccountToken: false
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
route:
  hostnames:
  - opslora.com
  path:
    type: PathPrefix
    value: /api/v1/orders
  backend:
    name: ''
    port: 3000
affinity:
  enabled: true
  podAntiAffinity:
    enabled: true
    type: preferredDuringSchedulingIgnoredDuringExecution
    weight: 100
    topologyKey: kubernetes.io/hostname
resources:
  requests:
    cpu: 50m
    memory: 150Mi
    ephemeral-storage: 300Mi
  limits:
    cpu: 100m
    memory: 300Mi
    ephemeral-storage: 500Mi
probes:
  startup:
    enabled: false
    path: /api/v1/orders/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12
  readiness:
    enabled: true
    path: /api/v1/orders/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    enabled: true
    path: /api/v1/orders/health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
secrets:
  ACCESS_TOKEN_EXPIRE_MINUTES: 
  API_URL: 
  DATABASE_URL: 
  ENVIRONMENT: 
  JWT_SECRET_KEY: 
  RABBITMQ_URL: 
