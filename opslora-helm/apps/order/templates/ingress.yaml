{{- if .Values.ingress.enabled }}
{{- $fullName := default .Values.fullname .Values.fullName }}
{{- $serviceName := default $fullName .Values.ingress.backend.name }}
{{- $servicePort := default .Values.service.port .Values.ingress.backend.port }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ default "order-ingress" .Values.ingress.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
spec:
  ingressClassName: {{ default "azure-application-gateway" .Values.ingress.className | quote }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | quote }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: {{ $serviceName }}
                port:
                  number: {{ $servicePort }}
          {{- end }}
    {{- end }}
{{- end }}
