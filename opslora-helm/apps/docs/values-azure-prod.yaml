fullname: docs-site-prod
image:
  repository: acropsloraprodcin001.azurecr.io/opslora-app-docs
  tag: "v2.0.0"
  pullPolicy: Always
ingress:
  enabled: true
  name: docs-ingress
  className: azure-application-gateway
  annotations: {}
  hosts:
    - host: docs.opslora.com
      paths:
        - path: /
          pathType: Prefix
  backend:
    name: docs-service
    port: 80
