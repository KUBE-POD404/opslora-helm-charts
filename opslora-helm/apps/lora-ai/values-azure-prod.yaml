image:
  repository: acropsloraprodcin001.azurecr.io/opslora-lora-ai-service
  tag: v2.0.1
replicaCount: 2
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0
nodeSelector:
  kubernetes.io/hostname: aks-apps-22553138-vmss000000
azureKeyVault:
  enabled: true
  keyVaultName: kv-opslora-prod-cin-001
  tenantId: 7f02300f-0f1b-4237-b981-c376377f394e
  identityClientId: e8b9e1b0-e396-4d81-924f-465bc5a1297b
  secretProviderClassName: spc-opslora-prod-lora-ai
  secrets:
    - objectName: opslora-prod-lora-ai-database-url
      envName: DATABASE_URL
    - objectName: opslora-prod-lora-ai-environment
      envName: ENVIRONMENT
    - objectName: opslora-prod-lora-ai-api-prefix
      envName: API_PREFIX
    - objectName: opslora-prod-lora-ai-primary-ai-provider
      envName: PRIMARY_AI_PROVIDER
    - objectName: opslora-prod-lora-ai-enable-azure-foundry-fallback
      envName: ENABLE_AZURE_FOUNDRY_FALLBACK
    - objectName: opslora-prod-lora-ai-hermes-base-url
      envName: HERMES_BASE_URL
    - objectName: opslora-prod-lora-ai-hermes-api-key
      envName: HERMES_API_KEY
    - objectName: opslora-prod-lora-ai-hermes-model
      envName: HERMES_MODEL
    - objectName: opslora-prod-lora-ai-hermes-timeout-seconds
      envName: HERMES_TIMEOUT_SECONDS
    - objectName: opslora-prod-lora-ai-vector-url
      envName: VECTOR_URL
    - objectName: opslora-prod-lora-ai-vector-api-key
      envName: VECTOR_API_KEY
    - objectName: opslora-prod-lora-ai-azure-foundry-endpoint
      envName: AZURE_AI_FOUNDRY_ENDPOINT
    - objectName: opslora-prod-lora-ai-azure-foundry-api-key
      envName: AZURE_AI_FOUNDRY_API_KEY
    - objectName: opslora-prod-lora-ai-azure-foundry-deployment
      envName: AZURE_AI_FOUNDRY_DEPLOYMENT
    - objectName: opslora-prod-lora-ai-azure-foundry-timeout-seconds
      envName: AZURE_AI_FOUNDRY_TIMEOUT_SECONDS
sealedSecret:
  enabled: false
gateway:
  enabled: false
ingress:
  enabled: true
  name: lora-ai-ingress
  className: azure-application-gateway
  annotations:
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: opslora-wildcard-le
    appgw.ingress.kubernetes.io/ssl-redirect: 'true'
  hosts:
    - host: app.opslora.com
      paths:
        - path: /api/v1/ai
          pathType: Prefix
  backend:
    name: lora-ai-service
    port: 8080
