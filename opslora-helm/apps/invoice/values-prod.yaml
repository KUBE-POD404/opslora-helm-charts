fullName: invoice-service
replicaCount: 3
image:
  repository: ghcr.io/kube-pod404/opslora-invoice-service
  tag: 920bd25
  pullPolicy: IfNotPresent
global:
  host: opslora.com
route:
  hostnames:
  - opslora.com
  path:
    type: PathPrefix
    value: /api/v1/invoices
  backend:
    name: ''
    port: 3000
secretName: invoice-secret
config:
  ORDER_SERVICE_URL: http://order-service:3000
  AUTH_SERVICE_URL: http://auth-service:3000
serviceAccount:
  create: true
  name: ''
pod:
  automountServiceAccountToken: false
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
affinity:
  enabled: true
  podAntiAffinity:
    enabled: true
    type: preferredDuringSchedulingIgnoredDuringExecution
    weight: 100
    topologyKey: kubernetes.io/hostname
resources:
  requests:
    cpu: 50m
    memory: 150Mi
    ephemeral-storage: 300Mi
  limits:
    cpu: 100m
    memory: 300Mi
    ephemeral-storage: 500Mi
probes:
  startup:
    enabled: false
    path: /api/v1/invoices/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12
  readiness:
    enabled: true
    path: /api/v1/invoices/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    enabled: true
    path: /api/v1/invoices/health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
secrets:
  ACCESS_TOKEN_EXPIRE_MINUTES: 
  API_URL: 
  DATABASE_URL: 
  ENVIRONMENT: 
  JWT_SECRET_KEY: 
  RABBITMQ_URL: 
