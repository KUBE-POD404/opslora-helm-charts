gateway:
  enabled: false

ingress:
  enabled: true
  name: payment-ingress
  className: azure/application-gateway
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: /
  hosts:
    - host: app-test.opslora.com
      paths:
        - path: /api/v1/payments
          pathType: Prefix
  backend:
    name: payment-service
    port: 3000

