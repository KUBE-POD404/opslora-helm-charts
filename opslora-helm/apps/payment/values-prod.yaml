fullName: payment-service
replicaCount: 3

image:
  repository: ghcr.io/kube-pod404/opslora-payment-service
  tag: "565c043"   
  pullPolicy: IfNotPresent

global:
  host: opslora.com

secretName: payment-secret

config:
  INVOICE_SERVICE_URL: "http://invoice-service:3000"

serviceAccount:
  create: true
  name: ""

pod:
  automountServiceAccountToken: false

route:
  hostnames:
    - opslora.com
  path:
    type: PathPrefix
    value: /api/v1/payments
  backend:
    name: ""
    port: 3000

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

affinity:
  enabled: true
  podAntiAffinity:
    enabled: true
    type: preferredDuringSchedulingIgnoredDuringExecution
    weight: 100
    topologyKey: kubernetes.io/hostname


resources:
  requests:
    cpu: 50m
    memory: 150Mi
    ephemeral-storage: 300Mi
  limits:
    cpu: 100m     
    memory: 300Mi
    ephemeral-storage: 500Mi

probes:
  startup:
    enabled: false
    path: /api/v1/payments/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12
  readiness:
    enabled: true
    path: /api/v1/payments/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    enabled: true
    path: /api/v1/payments/health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

secrets:
  ACCESS_TOKEN_EXPIRE_MINUTES: ""
  API_URL: ""
  DATABASE_URL: ""
  ENVIRONMENT: ""
  JWT_SECRET_KEY: ""
  RABBITMQ_URL: ""
  