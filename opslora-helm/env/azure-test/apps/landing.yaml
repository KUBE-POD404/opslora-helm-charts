apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: landing-site-azure-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git
    targetRevision: test/opslora-helm-test
    path: opslora-helm/apps/landing
    helm:
      releaseName: landing-site-azure-test
      valueFiles:
        - values.yaml
        - values-azure-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: opslora-app-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
