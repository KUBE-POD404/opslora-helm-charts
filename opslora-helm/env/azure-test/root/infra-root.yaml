apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-root-azure-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git
    targetRevision: azure/agic-application-gateway
    path: opslora-helm/env/azure-test/infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

