{{- $oidc := .Values.headlamp.config.oidc | default dict }}
{{- $externalSecret := $oidc.externalSecret | default dict }}
{{- $azureKeyVault := .Values.azureKeyVault | default dict }}
{{- if and $azureKeyVault.enabled $externalSecret.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $azureKeyVault.secretProviderClassName | default "spc-headlamp-oidc" | quote }}
  namespace: {{ .Release.Namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ required "azureKeyVault.identityClientId is required when azureKeyVault.enabled=true" $azureKeyVault.identityClientId | quote }}
    keyvaultName: {{ required "azureKeyVault.keyVaultName is required when azureKeyVault.enabled=true" $azureKeyVault.keyVaultName | quote }}
    tenantId: {{ required "azureKeyVault.tenantId is required when azureKeyVault.enabled=true" $azureKeyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ $azureKeyVault.oidcClientSecretObjectName | default "opslora-test-headlamp-oidc-client-secret" | quote }}
          objectType: secret
          objectAlias: clientSecret
  secretObjects:
    - secretName: {{ required "headlamp.config.oidc.externalSecret.name is required" $externalSecret.name | quote }}
      type: Opaque
      data:
        - objectName: clientSecret
          key: clientSecret
{{- end }}
